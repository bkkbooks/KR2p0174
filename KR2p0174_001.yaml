body:
  text: 武威漢簡甲本燕禮釋文燕禮小臣戒與者善宰具官選于寢東樂人縣洗匪于作階東南當東曹雷水在東匪在洗西南肆臘匪在其北西面司宮尊于東楹之西兩方壺左玄酒南上公尊瓦泰兩有酆幕如𨚫如錫在尊南上尊出旅食于門西兩圜壺司宮延賓于戶西東上無加席射人告具小臣設公席于阼階上西鄉設加席公升即位于席西鄉小臣入卿夫卿夫皆入門右北面東上出立于西方東面北上祝使立于門東北面東上小臣師一人在東堂下南面士旅食者立于門西東上公降立于作階之東南鄉璽卿西面北上璽大夫皆少進射人請賓公曰命東為賓射人命賓少進禮辭反命又命之賓再拜稽首許若射人反命賓出立于門外東面公揖卿大夫乃升就席小臣自作階下北面請執幕者與羞善者乃命執幕者升自西階立于尊南北面東上膳宰請羞于諸公卿者擯者納賓賓入及庭公降一等加之公升就席賓升自西階主人亦升自西階擯右北面至再拜賓合再拜主人降洗南西北面賓降階西東面主人辭降賓對主人北面盥坐取柧洗賓少進辭洗主人坐鄭柧于匪興對賓反位主人卒洗賓揖乃升主人升賓拜洗主人賓右鄭柧合拜降盥賓降主人辭賓對卒盥賓揖升主人升坐取柧執幕者舉幕主人酌善執幕者反幕主人延前獻賓西階上拜延前受爵反位主人賓右拜送爵膳宰薦脯醢賓升筵膳宰設折俎賓坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭齊之興加于柤坐梲手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人答拜賓西階上北面坐卒爵興坐奠爵遂拜主人答拜賓以虛爵降主人降賓洗南坐鄭柧少進辭降主人東面對賓坐取觚奠于篚下盥洗主人辭洗賓坐奠觚于篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執幂如初以酢主人于西階上主人北面拜受爵賓主人之左拜送爵主人坐祭不啐酒不拜酒不告旨遂卒爵興坐鄭爵拜執爵興賓答拜主人不崇酒以虛爵降奠于篚賓降立于西階西射人升賓賓升立于序內東面主人盥洗象觚升實之東北面獻于公公拜受爵主人降自西階阼階下北面拜送爵士薦脯醢膳宰設折俎升自西階公祭如賓禮膳宰贊授肺不拜酒立卒爵坐奠爵拜執爵興主人答拜升受爵以降奠于膳篚更爵洗升酌膳酒以降酢于阼階下北面坐奠爵再拜稽首公合再拜主人坐祭遂卒爵再拜稽首公答再拜主人奠爵于篚主人盥洗升媵觚于賓酌散西階上坐鄭爵拜賓降延北面合拜主人坐祭遂飲賓辭卒爵拜賓合拜主人降洗賓降主人辭降賓辭洗卒洗揖升不拜洗主人酌膳賓西階上拜受爵于延前反位主人拜送爵賓升席坐祭酒遂鄭于幕東主人降復位賓降延西東南面立小臣自作階下請媵爵者公命長小臣作下大夫二人媵爵者作階下皆北面再拜稽首公合再拜騰爵者立于洗南西面北上序進盥洗角𧣨升自西階序汋散交于楹北降作階下皆鄭𧣨再拜稽首執觶興公合再拜騰爵者皆坐祭遂卒𧣨興坐鄭𧣨再拜稽首執𧣨興公合再拜勝爵者執𧣨持于洗南小臣請致者若君命皆致則序進奠觶于篚阼階下皆再拜稽首公答再拜媵爵者洗象𧣨升賓之序進坐鄭于薦南北上降作階下皆再拜稽首送𧣨公合再拜公坐取夫所勝𧣨興以州賓賓降西階下再拜稽首公命小臣辭賓升成拜公坐鄭𧣨合再拜執𧣨興立卒𧣨賓下拜小臣辭賓升再拜稽首公坐鄭𧣨合再拜執𧣨興賓進受虛𧣨降鄭于匪易𧣨洗公有命則弗更不洗反升酌膳下拜小臣辭升再拜稽首公合再拜賓以旅州於西階上射人作夫長升受旅賓夫之右坐鄭𧣨拜執𧣨興夫合拜賓坐祭立卒𧣨不拜如膳𧣨也則降更𧣨洗升實散夫拜受賓拜送夫辨受州如受賓州之禮不祭卒受者以虛𧣨降鄭于匪主人洗升實散獻卿于西階上司宮兼卷重席設于賓左東上卿升拜受柧主人拜送柧卿辭重席司宮徹之乃薦脯醢卿升席坐左執爵右祭脯醢遂祭酒不啐酒降席西階上北面坐卒爵興坐鄭爵拜執爵興主人合拜受爵卿降復位辨獻卿主人以虛爵降射人乃升卿皆升就席如右諸公則先卿就之如就卿之禮席于作階西北面東上無加席小臣有請騰爵者二夫騰爵如初請致者若命長致則勝爵者鄭𧣨于匪一人寺于洗南長致者作階下再拜稽首公合再拜洗象𧣨升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公答再拜公又行一爵若賓若長唯公所州以旅于西階上如初大夫卒受者以虛觶降奠于篚主人洗升就夫于西階上夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位胥薦主人于洗北西面脯醢無脀辨就夫送薦之繼賓以西東上卒射人乃升大夫大夫皆升就席席工于西階上少東樂正先升北面立于其西小臣入工四人二瑟小臣佐何瑟面鼓執越內弦右相入升自西階北面東上坐小臣坐授瑟乃降工歌鹿鳴四牡皇皇者華卒歌主人洗就工不興左瑟一人拜受爵主人西階上拜送爵薦脯醢使人相祭卒爵不拜主人受爵衆工不拜受爵祭遂卒爵辨有脯醢不祭主人受爵降奠于匪公有舉鄭𧣨唯所賜以盧于西階上如初卒主人立于縣中奏南𧣨白黍黍主人洗升獻生于西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵辨有脯醢弗祭乃閒歌魚麗生由庚歌南有嘉魚生崇立歌南山有壼生由儀遂歌薌樂周南關睢葛勝縇耳召南䧿蕉采䒬采大𨸲告于樂正曰正歌備樂正由楹內東之東告于公乃降復位射人自作階下請立司正公許射人遂為司正洗角𧣨南西坐鄭于中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安司正降自西階南面坐取𧣨升酌散降南面坐鄭𧣨右興北面少立坐取𧣨興坐不祭卒𧣨鄭之興再拜稽首左還南面坐取𧣨洗南面反鄭于其所升自西階東之東請徹柤公許告于賓北面取柤以出膳宰徹公柤降自作階以東卿大夫皆降東面北上賓反入及卿大夫皆說屢升就席公以賓及卿大夫皆坐乃安羞庶羞大夫祭薦司正升受命皆命君曰無不醉賓及卿大夫皆興對曰諾敢不醉皆反坐主人洗升獻士于西階上士長升再拜受柧主人拜送士坐祭立飲不拜溉爵其也不拜坐祭立飲乃薦司正與射人一人司士一人執幕二人于𧣨南東上辨獻士溉獻者立于東方西面北上乃薦士祝史小臣𨸲亦就其位而薦之主人就盧食之尊而獻之盧食不拜受爵坐祭立飲如射則泰射正為司射如卿射之禮賓降洗升勝柧于公酌散下拜公降一等小臣辭賓升再拜稽首公合再拜賓坐祭卒爵再拜稽首公合再拜賓降洗象柧升酌膳坐鄭于薦南降拜小臣辭賓升成拜公合再拜賓反位公坐取賓所揚柧興雍公所賜受賜者如初受州之禮降更爵洗升酌膳上拜爵小臣辭升成拜公答拜乃就席坐行之有執爵者唯受于公者拜司正命執爵者爵辨卒受者興以州士大夫卒受者以爵興西階上州士升大夫鄭爵拜士合拜大夫立卒爵不拜實之士拜受大夫拜送士柧于西階上辨士旅酌主人洗升自西階獻庶子于作階上如獻士之禮辨降洗遂獻左右正與內小臣皆於作階上如獻庶子之禮無算爵士有執膳爵者執膳爵者酌以進公不拜受執散爵者酌以之命所賜者興受爵降席下鄭爵再拜稽首公合拜受賜者以爵就庶坐公卒爵祭后飲執膳爵者受公爵酌反鄭之受賜者興授執散爵者乃酌行之唯受于公者拜卒受者興以州士于西階上士升大夫不拜乃飲賓爵士不拜受爵大夫就席士旅酌亦如之公有命徹幂則卿大夫皆降西階下北面東上再拜稽首公命小臣辭公合再拜大夫皆辟遂升反坐士終旅於上如初無算樂則庶子執燭於作階上司宮執燭於西階上甸人執大燭於庭閔人為燭於門外賓醉北面坐取其薦脯以降秦胲所執脯以賜鍾人于門內溜遂士卿大夫皆出公不送公與客燕曰寫君有不𨡏酒以請子之與寫君須臾焉使某以請寫君之私也君無所辱錫于使臣敢辭寫君固曰不𨡏使某固以請寫君之私也無所辱賜于使臣敢固辭寫君曰不𨡏使某固以請某辭不得命敢不從致命曰寫君使某有不𨡏酒以請子之與寫君須臾焉君況寫君易辱賜于使臣敢拜賜命凡三千六十六字燕朝服於寖其生狗也享于門外東方如與四方之賓則公使之于秦門內揖讓升賓為苟敬席于作階之西北面有脀不嚌肺不啐酒其介為賓無膳尊無膳爵與卿燕大夫為賓與大夫亦大夫為賓羞膳者與執幕者皆士也羞卿者小膳宰也如以樂內賓則賓及庭秦肆夏賓拜酒主人答拜而樂公拜受爵秦肆夏公卒爵主人升受爵以下樂升歌鹿鳴下管新宮生入三成遂合鄉樂如舞則酌唯公與賓有柤獻公曰臣敢秦爵以聽命凡公所辭皆粟階不過二等凡公所州既拜請旅侍臣凡薦與羞者小膳宰也有內羞君與射則為下射袒朱襦樂作而后就物小臣以巾授矢稍屬不以樂志既發則小臣受弓以授弓人上退于物一等既發則對君而迎如飲君燕則俠爵在大夫射則肉袒如與西方之賓燕揚爵曰臣受賜矣臣請贊執爵相者對曰吾子毋自辱焉有房中之樂記三百三文
